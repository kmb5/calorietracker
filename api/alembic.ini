# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden at runtime by env.py reading DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://calorietracker:secret@db:5432/calorietracker

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
