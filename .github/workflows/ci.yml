name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + type-check + tests ──────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorietracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check app/ tests/

      - name: Ruff format check
        run: uv run ruff format --check app/ tests/

      - name: Type-check (ty)
        run: uv run ty check app/

      - name: Run tests
        run: uv run pytest
        # Tests use SQLite in-memory — no Postgres connection needed at test time.
        # The postgres service above is available if integration tests are added later.

  # ── Frontend: lint + type-check + tests ─────────────────────────────────────
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: Prettier check
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"

      - name: TypeScript type-check
        run: pnpm run type-check

      - name: Jest tests
        run: pnpm run test

  # ── Security: Trivy (deps + secrets) ────────────────────────────────────────
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload SARIF to the Security tab

    steps:
      - uses: actions/checkout@v6

      - name: Trivy — dependency vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-vuln.sarif

      - name: Trivy — secret scan
        if: always()  # run even if vuln step failed
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "1"
          format: sarif
          output: trivy-secrets.sarif

      - name: Upload vuln results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-vuln.sarif
          category: trivy-vuln

      - name: Upload secret results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets
